<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatos Pronostic — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--surface:#111520;--card:#161c2d;--card2:#1c2438;--border:#232d45;--haiti-blue:#00209f;--haiti-red:#d21034;--gold:#f5c842;--green:#00e68a;--cyan:#00c8ff;--muted:#5a6a8a;--text:#dce8ff;--white:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(0,32,159,0.32) 0%,transparent 60%),radial-gradient(ellipse 60% 35% at 80% 100%,rgba(210,16,52,0.28) 0%,transparent 55%);pointer-events:none;}
.flag-bg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(90vw,700px);opacity:0.1;pointer-events:none;z-index:0;}
.flag-top{height:140px;background:#00209f;}
.flag-bot{height:140px;background:#d21034;}
.login-wrap{position:relative;z-index:10;width:100%;max-width:400px;padding:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;box-shadow:0 0 60px rgba(0,32,159,0.2),0 0 30px rgba(0,0,0,0.5);}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:36px;gap:12px;}
.logo{width:68px;height:68px;background:linear-gradient(135deg,var(--haiti-blue),#0035cc);border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 30px rgba(245,200,66,0.4);}
.brand h1{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,#fff 0%,var(--gold) 50%,var(--haiti-red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.slogan{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 16px rgba(245,200,66,0.5);}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:var(--muted);}
.btn-login{width:100%;margin-top:8px;background:linear-gradient(135deg,var(--haiti-blue),#0035cc);border:none;border-radius:8px;padding:13px;color:#fff;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,32,159,0.4);}
.btn-login:hover{background:linear-gradient(135deg,#0029cc,#0041ff);box-shadow:0 4px 28px rgba(0,32,159,0.7);transform:translateY(-1px);}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.error-msg{display:none;margin-top:14px;padding:10px 14px;background:rgba(210,16,52,0.15);border:1px solid rgba(210,16,52,0.4);border-radius:7px;color:#ff6b6b;font-size:13px;text-align:center;}
.error-msg.show{display:block;}
</style>
</head>
<body>
<div class="flag-bg"><div class="flag-top"></div><div class="flag-bot"></div></div>
<div class="login-wrap">
  <div class="card">
    <div class="brand">
      <div class="logo">⚽</div>
      <h1>Fatos Pronostic</h1>
      <div class="slogan">Enèji</div>
    </div>
    <div class="field">
      <label>Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Connexion</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>
<script>
async function doLogin(){
  const btn=document.getElementById('loginBtn');
  const errEl=document.getElementById('loginError');
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!p){showErr('Veuillez remplir tous les champs.');return;}
  btn.disabled=true;btn.textContent='Connexion…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){window.location.href='/';}
    else{showErr(d.error||'Erreur de connexion');btn.disabled=false;btn.textContent='Connexion';}
  }catch(e){showErr('Erreur réseau');btn.disabled=false;btn.textContent='Connexion';}
}
function showErr(msg){const e=document.getElementById('loginError');e.textContent=msg;e.classList.add('show');}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
